# Databricks Asset Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "dashboard-cicd-demo-bundle"

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  warehouse_id:
    default: "4b9b953939869799"

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://e2-demo-west.cloud.databricks.com
      # We always use /Users/josh.bae@databricks.com for all resources to make sure we only have a single copy.
      root_path: /Users/josh.bae@databricks.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as josh.bae@databricks.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: josh.bae@databricks.com
    variables:
      warehouse_id: "75fd8278393d07eb"

resources:
  dashboards:
    nyc_taxi_trip_analysis:
      display_name: "NYC Taxi Trip Analysis"
      file_path: ./NYC Taxi Trip Analysis.lvdash.json
      warehouse_id: ${var.warehouse_id}
